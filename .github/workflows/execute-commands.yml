name: execute-commands

# Executor for the amp-showcase web UI (the browser dashboard).
#
# The browser console never calls the AMP API directly (CORS + secret safety).
# It enqueues Command objects into state.json (state="pending"). This workflow
# runs amp-executor.sh, which drains that queue: for each pending command it
# runs the matching AMP control-plane action (self-contained curl — no clone of
# the private amp-showcase repo), writes results back into state.json
# (deployment status + public_url, command state), and this job commits the file.
#
# WHERE THIS RUNS: this file, together with amp-executor.sh, lives in *each
# FDE's own private state repo* (see docs/walkthroughs/05-onboard-a-new-fde.md
# for how to install it — "Use this template" or a one-line gh command). It
# reads that repo's state.json and that repo's secrets. The canonical copy lives
# in tbaums/amp-showcase-web-ui; state repos install a copy.
#
# Runs on a ~5-minute schedule and on manual dispatch. The concurrency guard
# stops two runs from racing on state.json.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  # Serialize executor runs against each other (queue, don't cancel — cancelling
  # a mid-provision run would abandon in-flight AMP deploys and skip the
  # write-back). NOTE: this only serializes *workflow runs*; it cannot serialize
  # the browser console's Contents-API writes to state.json (those aren't runs),
  # so the "Commit results" step below still fetch+rebase+retries to survive an
  # interleaved write. Both guards are needed.
  group: execute-commands
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout state repo
        uses: actions/checkout@v4

      - name: Drain pending commands
        env:
          # Repo secrets (Settings → Secrets and variables → Actions).
          # CREWAI_TOKEN: the AMP Settings → Account bearer token (~60-day TTL).
          # SHOWCASE_ORG: your AMP org UUID.
          # ANTHROPIC_API_KEY (optional): passed to deployed crews so a later
          #   kickoff can call the model; provisioning itself doesn't need it.
          CREWAI_TOKEN: ${{ secrets.CREWAI_TOKEN }}
          SHOWCASE_ORG: ${{ secrets.SHOWCASE_ORG }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Owner of the public per-scenario deploy repos (amp-showcase-<sector>-<slug>).
          # Optional repo *variable*; defaults to the central owner inside the script.
          SHOWCASE_DEPLOY_OWNER: ${{ vars.SHOWCASE_DEPLOY_OWNER }}
        run: bash amp-executor.sh

      - name: Commit results
        run: |
          set -euo pipefail
          if git diff --quiet -- state.json; then
            echo "No changes to state.json."
            exit 0
          fi
          git config user.name  "amp-showcase-executor"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "executor: drain pending commands ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # A concurrent write to state.json — the browser console enqueuing a
          # command, or an overlapping run — can move the remote ahead while we
          # were provisioning (a run takes minutes), so a bare push bounces with
          # a non-fast-forward rejection and fails the whole run. Integrate the
          # remote first, then push; retry to cover a fresh race between the
          # fetch and the push. state.json changes are appends (new commands) +
          # fields the executor owns, so a rebase merges the common case cleanly;
          # a genuine same-line conflict aborts loudly so the next run reconciles
          # (rather than silently clobbering a queued command).
          pushed=""
          for attempt in $(seq 1 5); do
            if git push origin HEAD:main; then
              echo "push succeeded (attempt $attempt)"; pushed=1; break
            fi
            echo "push rejected (attempt $attempt) — integrating remote and retrying"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::state.json rebase conflict (a concurrent write touched the same lines) — aborting; the next run will reconcile."
              exit 1
            fi
          done
          if [ -z "$pushed" ]; then
            echo "::error::push still rejected after 5 attempts"; exit 1
          fi
